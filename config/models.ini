version = 1

[*]
c = 8192
jinja = true
flash-attn = auto
fit = on

; Replace placeholder filenames with the GGUF files installed on your machine.
[lfm2.5-prompt]
model = ../models/prompt/LFM2.5-1.2B-Instruct-Q4_0.gguf
n-gpu-layers = 0
n-predict = 800

[gemma4-e2b]
model = ../models/chat/gemma4-e2b-Q4_K_M.gguf
n-gpu-layers = auto
n-predict = 4096

[qwen-coder]
model = ../models/coding/qwen-coder-Q4_K_M.gguf
n-gpu-layers = auto
n-predict = 4096

[vision-model]
model = ../models/vision/vision-model-Q4_K_M.gguf
mmproj = ../models/vision/vision-model-mmproj.gguf
n-gpu-layers = auto
n-predict = 2048
